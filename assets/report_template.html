<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background: #f6f7f9; color: #17202a; line-height: 1.55; }
    header { padding: 28px 32px 18px; background: #fff; border-bottom: 1px solid #d9dee7; }
    h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
    .meta { color: #5f6b7a; font-size: 14px; }
    main { padding: 24px 32px 40px; }
    section { background: #fff; border: 1px solid #d9dee7; border-radius: 8px; overflow: hidden; }
    h2 { margin: 0; padding: 14px 16px; font-size: 17px; border-bottom: 1px solid #d9dee7; background: #fbfcfe; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 1320px; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #d9dee7; vertical-align: top; text-align: left; }
    th { background: #eef3fa; white-space: nowrap; }
    .score { font-weight: 700; color: #1464d2; }
    .title { min-width: 300px; max-width: 460px; font-weight: 600; }
    video { width: 260px; max-width: 100%; height: 146px; background: #111; border-radius: 6px; display: block; margin-bottom: 8px; }
    a { color: #1464d2; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .note { color: #5f6b7a; font-size: 13px; padding: 12px 16px 16px; background: #fbfcfe; }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{META}}</div>
  </header>
  <main>
    <section>
      <h2>内容清单（{{COUNT}}）</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>平台</th>
              <th>评分</th>
              <th>主题分类</th>
              <th>标题</th>
              <th>账号</th>
              <th>发布时间</th>
              <th>关键信息</th>
              <th>可借鉴点</th>
              <th>入选理由</th>
              <th>链接/播放</th>
            </tr>
          </thead>
          <tbody>{{ROWS}}</tbody>
        </table>
      </div>
      <div class="note">视频仅用于内部选题研究和报告预览；不要未授权转载或发布。</div>
    </section>
  </main>
</body>
</html>
